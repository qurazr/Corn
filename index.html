<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Aevi — A1 English Learning</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0B0E17;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            color: #FFFFFF;
            padding: 1rem;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
        }

        .topics-panel {
            flex: 2;
            min-width: 260px;
            background: rgba(18, 22, 35, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(0, 255, 157, 0.2);
            padding: 1.5rem;
            height: fit-content;
        }

        .topics-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .tab-switch {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: #0F1322;
            border: 1px solid #2A2F42;
            border-radius: 40px;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: #0aff9d;
            color: #0B0E17;
            border-color: #0aff9d;
        }

        .topic-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 6px;
        }

        .topic-item {
            background: #111624;
            border-radius: 60px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border: 1px solid #282E44;
            transition: 0.2s;
        }

        .topic-item.completed {
            background: rgba(0, 255, 157, 0.12);
            border-color: #0aff9d;
        }

        .topic-item.active {
            border-color: #0aff9d;
            box-shadow: 0 0 12px rgba(0, 255, 157, 0.3);
            background: #1A2035;
        }

        .topic-status {
            width: 28px;
            height: 28px;
            background: #2A2F42;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .topic-item.completed .topic-status {
            background: #0aff9d;
            color: #0B0E17;
        }

        .topic-name {
            flex: 1;
            font-weight: 500;
        }

        .topic-badge {
            font-size: 11px;
            background: #00c3ff20;
            padding: 4px 10px;
            border-radius: 60px;
            color: #7df9ff;
        }

        .content-panel {
            flex: 5;
            min-width: 300px;
            background: rgba(12, 15, 26, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            border: 1px solid rgba(0, 255, 157, 0.25);
            padding: 1.8rem;
            max-height: 80vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .glow-text {
            background: linear-gradient(135deg, #BFFFC7, #7DF9FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
        }

        .btn {
            background: linear-gradient(95deg, #0aff9d, #00c3ff);
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 700;
            color: #0B0E17;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
            font-size: 1rem;
            transition: 0.2s;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #0aff9d;
            color: #0aff9d;
        }

        .progress {
            margin: 10px 0;
            height: 6px;
            background: #1e2a32;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #0aff9d, #00c3ff);
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 500px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #0F1322;
            border-radius: 24px;
            margin-bottom: 16px;
            max-height: 500px;
        }

        .message {
            margin-bottom: 16px;
            padding: 12px 16px;
            border-radius: 20px;
            max-width: 85%;
            word-wrap: break-word;
        }

        .user-message {
            background: #0aff9d;
            color: #0B0E17;
            align-self: flex-end;
            margin-left: auto;
        }

        .ai-message {
            background: #1A2035;
            border: 1px solid #2A2F42;
            color: #fff;
        }

        .chat-input-area {
            display: flex;
            gap: 12px;
            margin-top: auto;
        }

        .chat-input {
            flex: 1;
            background: #0a0f16;
            border: 1px solid #2a3a4a;
            border-radius: 40px;
            padding: 12px 18px;
            color: white;
            font-size: 1rem;
        }

        .chat-send {
            background: #0aff9d;
            border: none;
            border-radius: 40px;
            padding: 0 20px;
            font-weight: 700;
            color: #0B0E17;
            cursor: pointer;
        }

        .theory-btn {
            background: #2A2F42;
            border: 1px solid #0aff9d;
            margin-bottom: 16px;
        }

        .vocabulary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }

        .vocab-card {
            background: #0F1322;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid #2A2F42;
        }

        .vocab-word {
            font-weight: bold;
            color: #0aff9d;
        }

        .vocab-translation {
            font-size: 0.9rem;
            color: #8A93B0;
            margin-top: 4px;
        }

        .practice-question {
            background: #11161f;
            border-radius: 24px;
            padding: 1.2rem;
            margin-bottom: 1.2rem;
        }

        .practice-input {
            background: #0a0f16;
            border: 1px solid #2a3a4a;
            border-radius: 40px;
            padding: 12px 18px;
            width: 100%;
            color: white;
            margin: 12px 0;
            font-size: 1rem;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            background: #0f141c;
            padding: 12px 18px;
            border-radius: 40px;
            cursor: pointer;
            border: 1px solid #2c3a4a;
            text-align: center;
        }

        .option:hover {
            border-color: #0aff9d;
            background: #1a2a2f;
        }

        .selected {
            background: #0aff9d20;
            border-color: #0aff9d;
            color: #ccffdd;
        }

        .ai-explanation {
            background: #0F1322;
            border-radius: 24px;
            padding: 16px;
            margin-top: 20px;
            border-left: 4px solid #0aff9d;
            font-size: 0.9rem;
            color: #CCDDFF;
        }

        @media (max-width: 780px) {
            .app-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="app-container" id="app"></div>

<script>
    // ==================== ГРАММАТИЧЕСКИЕ ТЕМЫ A1 ====================
    const grammarTopics = [
        { id: "g1", name: "Глагол TO BE (am/is/are)", grammarFocus: "to_be" },
        { id: "g2", name: "Present Simple (I work, he works)", grammarFocus: "present_simple" },
        { id: "g3", name: "Present Continuous (I am doing)", grammarFocus: "present_continuous" },
        { id: "g4", name: "Модальный глагол CAN", grammarFocus: "can" },
        { id: "g5", name: "Future: to be going to", grammarFocus: "going_to" },
        { id: "g6", name: "Past Simple: was/were", grammarFocus: "was_were" },
        { id: "g7", name: "Wh-questions (what, where, when...)", grammarFocus: "wh_questions" },
        { id: "g8", name: "There is / There are", grammarFocus: "there_is_are" },
        { id: "g9", name: "Like + verb-ing", grammarFocus: "like_ing" },
        { id: "g10", name: "Местоимения (Subject, Object, Possessive)", grammarFocus: "pronouns" }
    ];

    // ==================== ЛЕКСИЧЕСКИЕ ТЕМЫ A1 ====================
    const vocabularyTopics = [
        { id: "v1", name: "Numbers 1-100", vocabulary: [
            { word: "one", translation: "один" }, { word: "two", translation: "два" }, { word: "three", translation: "три" },
            { word: "four", translation: "четыре" }, { word: "five", translation: "пять" }, { word: "six", translation: "шесть" },
            { word: "seven", translation: "семь" }, { word: "eight", translation: "восемь" }, { word: "nine", translation: "девять" },
            { word: "ten", translation: "десять" }, { word: "twenty", translation: "двадцать" }, { word: "thirty", translation: "тридцать" },
            { word: "forty", translation: "сорок" }, { word: "fifty", translation: "пятьдесят" }, { word: "sixty", translation: "шестьдесят" },
            { word: "seventy", translation: "семьдесят" }, { word: "eighty", translation: "восемьдесят" }, { word: "ninety", translation: "девяносто" },
            { word: "hundred", translation: "сто" }, { word: "first", translation: "первый" }, { word: "second", translation: "второй" }
        ] },
        { id: "v2", name: "Family", vocabulary: [
            { word: "mother", translation: "мама" }, { word: "father", translation: "папа" }, { word: "brother", translation: "брат" },
            { word: "sister", translation: "сестра" }, { word: "grandmother", translation: "бабушка" }, { word: "grandfather", translation: "дедушка" },
            { word: "aunt", translation: "тётя" }, { word: "uncle", translation: "дядя" }, { word: "cousin", translation: "двоюродный брат/сестра" },
            { word: "parents", translation: "родители" }, { word: "children", translation: "дети" }, { word: "son", translation: "сын" },
            { word: "daughter", translation: "дочь" }, { word: "husband", translation: "муж" }, { word: "wife", translation: "жена" }
        ] },
        { id: "v3", name: "Home & Furniture", vocabulary: [
            { word: "house", translation: "дом" }, { word: "room", translation: "комната" }, { word: "door", translation: "дверь" },
            { word: "window", translation: "окно" }, { word: "wall", translation: "стена" }, { word: "floor", translation: "пол" },
            { word: "table", translation: "стол" }, { word: "chair", translation: "стул" }, { word: "bed", translation: "кровать" },
            { word: "sofa", translation: "диван" }, { word: "kitchen", translation: "кухня" }, { word: "bathroom", translation: "ванная" }
        ] }
    ];

    // ==================== ИИ ДЛЯ ОБЪЯСНЕНИЯ ТЕМ ====================
    function getAIExplanation(topic) {
        const focus = topic.grammarFocus;
        if (focus === "to_be") {
            return `Тема: Глагол TO BE (am/is/are)

Описание: Глагол to be переводится как 'быть, находиться, являться'. В русском языке мы часто опускаем этот глагол, но в английском он обязателен.

Формы глагола:
- I am (я есть)
- He/She/It is (он/она/оно есть)
- You/We/They are (ты/вы/мы/они есть)

Примеры:
I am a student. (Я студент)
She is a doctor. (Она врач)
We are happy. (Мы счастливы)

Отрицание: добавляем not после глагола
I am not tired. (Я не устал)
He is not (isn't) at home. (Его нет дома)

Вопрос: ставим глагол в начало предложения
Am I late? (Я опоздал?)
Is she your sister? (Она твоя сестра?)

Чтобы закрепить тему, выполните практические задания.`;
        } else if (focus === "present_simple") {
            return `Тема: Present Simple (настоящее простое время)

Описание: Используется для описания фактов, привычек, расписаний.

Формула:
- I/You/We/They + глагол (без изменений)
- He/She/It + глагол + s/es

Примеры:
I work every day. (Я работаю каждый день)
She works at a hospital. (Она работает в больнице)
The sun rises in the east. (Солнце встает на востоке)

Отрицание:
I don't like coffee. (Я не люблю кофе)
She doesn't speak Spanish. (Она не говорит по-испански)

Вопрос:
Do you like music? (Ты любишь музыку?)
Does she play tennis? (Она играет в теннис?)

Правила добавления -es: после -s, -ss, -sh, -ch, -x, -o (go -> goes, watch -> watches)`;
        } else {
            return `Тема: ${topic.name}

Это важная грамматическая тема уровня A1. Чтобы получить подробное объяснение, выберите тему из списка слева.`;
        }
    }

    // ==================== ИИ ДЛЯ ОТВЕТОВ НА ВОПРОСЫ ====================
    function getAIResponse(userMessage, topic) {
        const msg = userMessage.toLowerCase();
        
        if (msg.includes('правило') || msg.includes('объясни') || msg.includes('расскажи')) {
            return getAIExplanation(topic);
        }
        
        if (msg.includes('пример')) {
            if (topic.grammarFocus === "to_be") {
                return "Примеры с глаголом to be:\n1. I am a teacher. (Я учитель)\n2. She is happy. (Она счастлива)\n3. They are at home. (Они дома)\n4. He is not late. (Он не опаздывает)\n5. Are you ready? (Ты готов?)";
            } else if (topic.grammarFocus === "present_simple") {
                return "Примеры Present Simple:\n1. I drink coffee every morning. (Я пью кофе каждое утро)\n2. She works in an office. (Она работает в офисе)\n3. The train leaves at 6 PM. (Поезд отправляется в 6)\n4. Do you like pizza? (Ты любишь пиццу?)\n5. He doesn't eat meat. (Он не ест мясо)";
            }
            return "Приведите конкретную тему, и я дам примеры.";
        }
        
        if (msg.includes('отрицание')) {
            if (topic.grammarFocus === "to_be") {
                return "Отрицание с to be:\nI am not (I'm not)\nHe/She/It is not (isn't)\nYou/We/They are not (aren't)\nПример: She is not a doctor. = She isn't a doctor.";
            } else if (topic.grammarFocus === "present_simple") {
                return "Отрицание в Present Simple:\nI/You/We/They + do not (don't) + глагол\nHe/She/It + does not (doesn't) + глагол\nПример: I don't speak French. He doesn't like coffee.";
            }
            return "Напишите тему, и я объясню отрицание.";
        }
        
        if (msg.includes('вопрос')) {
            return "Чтобы задать вопрос, поставьте вспомогательный глагол на первое место.\n\nПримеры:\nAre you ready? (Ты готов?)\nDo you like music? (Ты любишь музыку?)\nDoes she work here? (Она здесь работает?)";
        }
        
        if (msg.includes('помощь') || msg.includes('что делать')) {
            return "Вы можете:\n1. Нажать 'Объяснить тему' для подробной теории\n2. Спросить про 'примеры'\n3. Спросить про 'отрицание'\n4. Спросить про 'вопросы'\n5. Задать свой вопрос по теме";
        }
        
        return `Я помогу вам разобраться с темой "${topic.name}".\n\nНапишите:\n- 'объясни правило'\n- 'примеры'\n- 'отрицание'\n- 'вопросы'\n\nИли задайте свой вопрос.`;
    }

    // ==================== ГЕНЕРАЦИЯ ЗАДАНИЙ ====================
    function generateTasks(topic) {
        let tasks = [];
        if (topic.grammarFocus === "to_be") {
            tasks = [
                { type: "input", question: "She ___ a doctor.", correct: "is", hint: "She + is" },
                { type: "input", question: "I ___ happy.", correct: "am", hint: "I + am" },
                { type: "input", question: "They ___ at home.", correct: "are", hint: "They + are" },
                { type: "input", question: "He ___ not tired.", correct: "is", hint: "He is not" },
                { type: "choice", question: "___ you ready?", options: ["Am", "Is", "Are"], correct: "Are", hint: "You + are" }
            ];
        } else {
            tasks = [
                { type: "input", question: "She ___ (work) every day.", correct: "works", hint: "She + works" },
                { type: "input", question: "I ___ (like) coffee.", correct: "like", hint: "I + like" }
            ];
        }
        while (tasks.length < 10) {
            tasks.push({ type: "input", question: "Translate: success", correct: "success", hint: "success - успех" });
        }
        return tasks;
    }

    // ==================== СОСТОЯНИЕ ====================
    let currentTab = "grammar";
    let currentTopic = null;
    let currentMode = "topics";
    let chatMessages = [];
    let currentTasks = [];
    let currentTaskIdx = 0;
    let userAnswers = [];
    let results = [];
    let showAIHint = false;
    let currentAIHint = "";
    let completedTopics = JSON.parse(localStorage.getItem("aevi_completed")) || [];

    function saveCompleted() {
        localStorage.setItem("aevi_completed", JSON.stringify(completedTopics));
    }

    function markCompleted(topicId) {
        if (!completedTopics.includes(topicId)) {
            completedTopics.push(topicId);
            saveCompleted();
        }
    }

    function selectTopic(topic) {
        currentTopic = topic;
        if (currentTab === "grammar") {
            chatMessages = [];
            currentMode = "chat";
        } else {
            currentMode = "vocabulary";
        }
        renderApp();
    }

    function explainTopic() {
        const explanation = getAIExplanation(currentTopic);
        chatMessages.push({ role: "ai", content: explanation });
        renderApp();
    }

    function sendMessage() {
        const input = document.getElementById("chatInput");
        if (!input || !input.value.trim()) return;
        
        const userMessage = input.value.trim();
        chatMessages.push({ role: "user", content: userMessage });
        
        const aiResponse = getAIResponse(userMessage, currentTopic);
        chatMessages.push({ role: "ai", content: aiResponse });
        
        input.value = "";
        renderApp();
    }

    function startPractice() {
        currentTasks = generateTasks(currentTopic);
        currentTaskIdx = 0;
        userAnswers = new Array(currentTasks.length).fill(null);
        results = new Array(currentTasks.length).fill(false);
        currentMode = "practice";
        showAIHint = false;
        renderApp();
    }

    function checkAnswer(answer) {
        const task = currentTasks[currentTaskIdx];
        const isCorrect = (answer.trim().toLowerCase() === task.correct.toLowerCase());
        userAnswers[currentTaskIdx] = answer;
        results[currentTaskIdx] = isCorrect;
        
        if (currentTaskIdx + 1 < currentTasks.length) {
            currentTaskIdx++;
            showAIHint = false;
            renderApp();
        } else {
            finishPractice();
        }
    }

    function finishPractice() {
        const correctCount = results.filter(r => r === true).length;
        const percent = (correctCount / currentTasks.length) * 100;
        if (percent >= 70 && currentTopic) markCompleted(currentTopic.id);
        currentMode = "results";
        renderApp();
    }

    function backToTopics() {
        currentMode = "topics";
        currentTopic = null;
        renderApp();
    }

    function renderApp() {
        const container = document.getElementById('app');
        if (!container) return;

        const currentTopics = currentTab === "grammar" ? grammarTopics : vocabularyTopics;
        const completedCount = currentTopics.filter(t => completedTopics.includes(t.id)).length;

        const topicListHtml = currentTopics.map((t, idx) => {
            const isCompleted = completedTopics.includes(t.id);
            const isActive = currentTopic && currentTopic.id === t.id;
            return `
                <div class="topic-item ${isCompleted ? 'completed' : ''} ${isActive ? 'active' : ''}" data-id="${t.id}">
                    <div class="topic-status">${isCompleted ? '✓' : idx+1}</div>
                    <div class="topic-name">${t.name}</div>
                    <div class="topic-badge">${currentTab === "grammar" ? 'грамматика' : 'лексика'}</div>
                </div>
            `;
        }).join('');

        let rightPanelHtml = '';

        if (currentMode === "topics") {
            rightPanelHtml = `
                <div class="chat-container">
                    <h2>Выберите тему</h2>
                    <p>Нажмите на любую тему слева, чтобы начать обучение.</p>
                </div>
            `;
        } else if (currentMode === "chat" && currentTopic) {
            const messagesHtml = chatMessages.map(msg => `
                <div class="message ${msg.role === 'user' ? 'user-message' : 'ai-message'}">
                    ${msg.content}
                </div>
            `).join('');
            
            rightPanelHtml = `
                <div class="chat-container">
                    <div style="display: flex; gap: 12px; margin-bottom: 16px;">
                        <h2>${currentTopic.name}</h2>
                        <button class="btn-outline btn" id="explainBtn" style="width: auto; margin-top: 0; padding: 8px 16px;">Объяснить тему</button>
                        <button class="btn-outline btn" id="practiceBtn" style="width: auto; margin-top: 0; padding: 8px 16px;">Практика</button>
                        <button class="btn-outline btn" id="backBtn" style="width: auto; margin-top: 0; padding: 8px 16px;">Назад</button>
                    </div>
                    <div class="chat-messages" id="chatMessages">
                        ${messagesHtml}
                    </div>
                    <div class="chat-input-area">
                        <input type="text" id="chatInput" class="chat-input" placeholder="Спросите ИИ о грамматике...">
                        <button class="chat-send" id="sendBtn">Отправить</button>
                    </div>
                </div>
            `;
        } else if (currentMode === "vocabulary" && currentTopic) {
            const vocabList = currentTopic.vocabulary;
            const vocabHtml = `
                <div class="vocabulary-grid">
                    ${vocabList.map(v => `
                        <div class="vocab-card">
                            <div class="vocab-word">${v.word}</div>
                            <div class="vocab-translation">${v.translation}</div>
                        </div>
                    `).join('')}
                </div>
            `;
            rightPanelHtml = `
                <div class="chat-container">
                    <div style="display: flex; gap: 12px; margin-bottom: 16px;">
                        <h2>${currentTopic.name}</h2>
                        <button class="btn-outline btn" id="backBtn" style="width: auto; margin-top: 0; padding: 8px 16px;">Назад</button>
                    </div>
                    ${vocabHtml}
                </div>
            `;
        } else if (currentMode === "practice" && currentTasks.length) {
            const task = currentTasks[currentTaskIdx];
            const isAnswered = userAnswers[currentTaskIdx] !== null;
            rightPanelHtml = `
                <div class="practice-block">
                    <div style="display:flex; justify-content:space-between; margin-bottom:16px;">
                        <h3>Практика: ${currentTopic.name}</h3>
                        <span>${currentTaskIdx+1}/${currentTasks.length}</span>
                    </div>
                    <div class="progress"><div class="progress-fill" style="width:${(currentTaskIdx/currentTasks.length)*100}%"></div></div>
                    <div class="practice-question">
                        <strong>${task.question}</strong>
                        ${task.type === 'choice' ? 
                            `<div class="options" style="margin-top: 12px;">
                                ${task.options.map(opt => `<div class="option" data-val="${opt}">${opt}</div>`).join('')}
                            </div>` : 
                            `<input type="text" id="answerInput" class="practice-input" placeholder="Введите ответ...">`
                        }
                        ${!isAnswered ? `<button class="btn" id="submitBtn">Проверить</button>` : ''}
                        ${showAIHint ? `<div class="ai-explanation">${currentAIHint}</div>` : ''}
                    </div>
                    <button class="btn-outline btn" id="backToChatBtn" style="margin-top: 12px;">Назад к чату</button>
                </div>
            `;
        } else if (currentMode === "results") {
            const correctCount = results.filter(r => r === true).length;
            const percent = Math.round((correctCount / currentTasks.length) * 100);
            rightPanelHtml = `
                <div class="results-block">
                    <h2>Результаты практики</h2>
                    <div style="text-align:center; margin: 40px 0;">
                        <div style="font-size: 48px; font-weight: bold; color: #0aff9d;">${correctCount}/${currentTasks.length}</div>
                        <div style="font-size: 18px;">${percent}% правильно</div>
                    </div>
                    <div class="progress"><div class="progress-fill" style="width:${percent}%"></div></div>
                    ${percent >= 70 ? '<p style="margin: 20px 0; text-align:center;">Тема пройдена! Отличная работа.</p>' : '<p style="margin: 20px 0; text-align:center;">Повторите тему и попробуйте снова.</p>'}
                    <button class="btn" id="backToChatBtn">Вернуться к чату</button>
                </div>
            `;
        }

        container.innerHTML = `
            <div class="topics-panel">
                <div class="topics-header">
                    <h3><span class="glow-text">Aevi</span> · A1</h3>
                </div>
                <div class="tab-switch">
                    <div class="tab-btn ${currentTab === 'grammar' ? 'active' : ''}" data-tab="grammar">Грамматика</div>
                    <div class="tab-btn ${currentTab === 'vocabulary' ? 'active' : ''}" data-tab="vocabulary">Лексика</div>
                </div>
                <div class="progress"><div class="progress-fill" style="width:${(completedCount/currentTopics.length)*100}%"></div></div>
                <div class="topic-list" id="topicList">
                    ${topicListHtml}
                </div>
            </div>
            <div class="content-panel" id="rightPanel">${rightPanelHtml}</div>
        `;

        // События
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentTab = btn.dataset.tab;
                currentMode = "topics";
                currentTopic = null;
                renderApp();
            });
        });

        document.querySelectorAll('.topic-item').forEach(el => {
            const topicId = el.dataset.id;
            const topic = currentTopics.find(t => t.id === topicId);
            if (topic) {
                el.addEventListener('click', () => selectTopic(topic));
            }
        });

        document.getElementById('explainBtn')?.addEventListener('click', explainTopic);
        document.getElementById('practiceBtn')?.addEventListener('click', startPractice);
        document.getElementById('backBtn')?.addEventListener('click', backToTopics);
        document.getElementById('backToChatBtn')?.addEventListener('click', () => {
            currentMode = "chat";
            renderApp();
        });
        document.getElementById('sendBtn')?.addEventListener('click', sendMessage);
        document.getElementById('chatInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        document.getElementById('submitBtn')?.addEventListener('click', () => {
            if (currentTasks[currentTaskIdx].type === 'choice') {
                const selected = document.querySelector('.option.selected');
                if (selected) checkAnswer(selected.dataset.val);
            } else {
                const input = document.getElementById('answerInput');
                if (input) checkAnswer(input.value);
            }
        });
        
        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', function() {
                document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
            });
        });
        
        // Автоскролл чата
        const chatMessagesDiv = document.getElementById('chatMessages');
        if (chatMessagesDiv) {
            chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
        }
    }

    renderApp();
</script>
</body>
</html>
