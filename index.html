<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Aevi — Изучение языков</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0B0E17;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            color: #FFFFFF;
            padding: 1rem;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
        }

        .topics-panel {
            flex: 2;
            min-width: 260px;
            background: rgba(18, 22, 35, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(0, 255, 157, 0.2);
            padding: 1.5rem;
            height: fit-content;
        }

        .topics-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .level-selector {
            background: #0F1322;
            border: 1px solid #2A2F42;
            border-radius: 48px;
            padding: 8px 16px;
            color: white;
            font-weight: 500;
            cursor: pointer;
        }

        .topic-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 6px;
        }

        .topic-item {
            background: #111624;
            border-radius: 60px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #282E44;
        }

        .topic-item.completed {
            background: rgba(0, 255, 157, 0.12);
            border-color: #0aff9d;
        }

        .topic-item.completed .topic-status {
            background: #0aff9d;
            color: #0B0E17;
        }

        .topic-item.active {
            border-color: #0aff9d;
            box-shadow: 0 0 12px rgba(0, 255, 157, 0.3);
            background: #1A2035;
        }

        .topic-status {
            width: 28px;
            height: 28px;
            background: #2A2F42;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .topic-name {
            flex: 1;
            font-weight: 500;
        }

        .topic-badge {
            font-size: 11px;
            background: #00c3ff20;
            padding: 4px 10px;
            border-radius: 60px;
            color: #7df9ff;
        }

        .content-panel {
            flex: 5;
            min-width: 300px;
            background: rgba(12, 15, 26, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            border: 1px solid rgba(0, 255, 157, 0.25);
            padding: 1.8rem;
        }

        .glow-text {
            background: linear-gradient(135deg, #BFFFC7, #7DF9FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
        }

        .btn {
            background: linear-gradient(95deg, #0aff9d, #00c3ff);
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 700;
            color: #0B0E17;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
            font-size: 1rem;
            transition: 0.2s;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #0aff9d;
            color: #0aff9d;
        }

        .ai-explanation {
            background: #0F1322;
            border-radius: 24px;
            padding: 16px;
            margin-top: 20px;
            border-left: 4px solid #0aff9d;
            font-size: 0.9rem;
            color: #CCDDFF;
        }

        .infinite-practice-area {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 24px;
            padding: 16px;
            margin-top: 20px;
            text-align: center;
        }

        .mistake-stats {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            font-size: 12px;
            margin-bottom: 12px;
            color: #8A93B0;
        }

        .progress {
            margin: 10px 0;
            height: 6px;
            background: #1e2a32;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #0aff9d, #00c3ff);
        }

        .practice-question {
            background: #11161f;
            border-radius: 24px;
            padding: 1.2rem;
            margin-bottom: 1.2rem;
        }

        .practice-input {
            background: #0a0f16;
            border: 1px solid #2a3a4a;
            border-radius: 40px;
            padding: 12px 18px;
            width: 100%;
            color: white;
            margin: 12px 0;
            font-size: 1rem;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            background: #0f141c;
            padding: 12px 18px;
            border-radius: 40px;
            cursor: pointer;
            border: 1px solid #2c3a4a;
            transition: all 0.2s;
            text-align: center;
        }

        .option:hover {
            border-color: #0aff9d;
            background: #1a2a2f;
        }

        .selected {
            background: #0aff9d20;
            border-color: #0aff9d;
            color: #ccffdd;
        }

        .theory-block, .practice-block, .results-block {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 780px) {
            .app-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="app-container" id="app"></div>

<script>
    // ==================== ПОЛНАЯ БАЗА ТЕМ A1-C2 (РУССКИЙ ЯЗЫК) ====================
    const KNOWLEDGE_BASE = {
        English: {
            A1: [
                { id: "a1_1", title: "Приветствия и знакомство", grammarFocus: "to be", theory: "<strong>Приветствия и глагол TO BE</strong><br><br>I am Alex. / You are a student. (Я Алекс. / Ты студент.)<br><strong>Отрицание:</strong> I am not (I'm not) tired. (Я не устал.)<br><strong>Вопрос:</strong> Are you ready? (Ты готов?)" },
                { id: "a1_2", title: "Глагол TO BE", grammarFocus: "to be", theory: "<strong>Спряжение глагола TO BE</strong><br><br>I am, He/She/It is, You/We/They are<br>Я есть, Он/Она/Оно есть, Ты/Мы/Они есть<br>+ I am happy. (Я счастлив.)<br>- I am not sad. (Я не грустный.)<br>? Are you OK? (Ты в порядке?)" },
                { id: "a1_3", title: "Множественное число", grammarFocus: "plural", theory: "<strong>Множественное число существительных</strong><br><br>cat → cats (кот → коты)<br>bus → buses (автобус → автобусы)<br>lady → ladies (леди → леди)<br><strong>Исключения:</strong> man → men, child → children, foot → feet" },
                { id: "a1_4", title: "Артикли A / AN / THE", grammarFocus: "articles", theory: "<strong>Артикли в английском языке</strong><br><br>a + согласный звук (a dog — собака)<br>an + гласный звук (an apple — яблоко)<br>THE — когда речь о конкретном предмете: the sun (солнце), the car we saw (машина, которую мы видели)" },
                { id: "a1_5", title: "Present Simple", grammarFocus: "present simple", theory: "<strong>Настоящее простое время (Present Simple)</strong><br><br>I work / He works (Я работаю / Он работает)<br>- I don't work / He doesn't work (Я не работаю / Он не работает)<br>? Do you work? / Does she work? (Ты работаешь? / Она работает?)" }
            ],
            A2: [
                { id: "a2_1", title: "Past Simple (правильные глаголы)", grammarFocus: "past simple", theory: "<strong>Прошедшее простое время (Past Simple) — правильные глаголы</strong><br><br>+ed: I played, she watched (Я играл, она смотрела)<br>- didn't play (не играл)<br>? Did you play? (Ты играл?)" },
                { id: "a2_2", title: "Неправильные глаголы (часть 1)", grammarFocus: "irregular verbs", theory: "<strong>Неправильные глаголы — нужно запомнить</strong><br><br>go → went (идти → пошёл)<br>see → saw (видеть → увидел)<br>buy → bought (покупать → купил)<br>think → thought (думать → подумал)<br>eat → ate (есть → съел)" },
                { id: "a2_3", title: "Future Simple (will)", grammarFocus: "future", theory: "<strong>Будущее простое время (Future Simple)</strong><br><br>I will call you tomorrow. (Я позвоню тебе завтра.)<br>- won't (не буду)<br>? Will you come? (Ты придёшь?)" },
                { id: "a2_4", title: "Конструкция to be going to", grammarFocus: "future plans", theory: "<strong>Конструкция to be going to (собираться сделать)</strong><br><br>I am going to study Spanish. (Я собираюсь учить испанский.)<br>Выражает запланированное действие." }
            ],
            B1: [
                { id: "b1_1", title: "Present Perfect", grammarFocus: "present perfect", theory: "<strong>Настоящее совершённое время (Present Perfect)</strong><br><br>I have visited London. (Я был в Лондоне.)<br>She has never tried sushi. (Она никогда не пробовала суши.)<br>Слова-маркеры: ever (когда-либо), never (никогда), already (уже), yet (ещё), since (с), for (в течение)" },
                { id: "b1_2", title: "Present Perfect Continuous", grammarFocus: "present perfect continuous", theory: "<strong>Настоящее совершённое длительное время</strong><br><br>I have been waiting for 2 hours. (Я жду уже 2 часа.)<br>Акцент на длительности действия." },
                { id: "b1_3", title: "Условные предложения (0,1 тип)", grammarFocus: "conditionals", theory: "<strong>Условные предложения</strong><br><br>0 тип (факты): If you heat ice, it melts. (Если нагреть лёд, он тает.)<br>1 тип (реальное условие): If it rains, I will stay home. (Если пойдёт дождь, я останусь дома.)" },
                { id: "b1_4", title: "Модальные глаголы (can, could, may)", grammarFocus: "modals", theory: "<strong>Модальные глаголы</strong><br><br>can — способность (I can swim — Я умею плавать)<br>could — вежливая просьба (Could you help me? — Не могли бы вы помочь?)<br>may — разрешение (May I come in? — Можно войти?)" }
            ],
            B2: [
                { id: "b2_1", title: "Пассивный залог", grammarFocus: "passive", theory: "<strong>Пассивный залог (Passive Voice)</strong><br><br>The book was written by Tolstoy. (Книга была написана Толстым.)<br>Формула: to be + V3 (причастие прошедшего времени)." },
                { id: "b2_2", title: "Условные предложения (2,3 тип)", grammarFocus: "conditionals", theory: "<strong>Условные предложения 2 и 3 типа</strong><br><br>2 тип (нереальное настоящее): If I were rich, I would travel. (Если бы я был богат, я бы путешествовал.)<br>3 тип (нереальное прошлое): If you had called, I would have helped. (Если бы ты позвонил, я бы помог.)" },
                { id: "b2_3", title: "Косвенная речь", grammarFocus: "reported speech", theory: "<strong>Косвенная речь (Reported Speech)</strong><br><br>She said that she was tired. (Она сказала, что устала.)<br>Сдвиг времён: настоящее → прошедшее." },
                { id: "b2_4", title: "Относительные придаточные", grammarFocus: "clauses", theory: "<strong>Относительные придаточные (Relative Clauses)</strong><br><br>The man who called you is my brother. (Человек, который тебе звонил, — мой брат.)<br>The book which I bought is interesting. (Книга, которую я купил, интересная.)" }
            ],
            C1: [
                { id: "c1_1", title: "Инверсия", grammarFocus: "inversion", theory: "<strong>Инверсия (Inversion)</strong><br><br>Never have I seen such beauty. (Никогда я не видел такой красоты.)<br>Not only did she arrive late, but she also forgot her keys. (Она не только опоздала, но и забыла ключи.)" },
                { id: "c1_2", title: "Сослагательное наклонение", grammarFocus: "subjunctive", theory: "<strong>Сослагательное наклонение (Subjunctive)</strong><br><br>I suggest that he go to the doctor. (Я предлагаю, чтобы он пошёл к врачу.)<br>It's essential that she be informed. (Важно, чтобы её проинформировали.)" },
                { id: "c1_3", title: "Смешанные условные", grammarFocus: "mixed conditionals", theory: "<strong>Смешанные условные предложения</strong><br><br>If he had studied, he would be an expert now. (Если бы он учился, он был бы сейчас экспертом.)<br>Смешивает время в условии и результате." },
                { id: "c1_4", title: "Эллипсис", grammarFocus: "ellipsis", theory: "<strong>Эллипсис (Ellipsis)</strong><br><br>'Can you help?' 'I can.' (Можешь помочь? Могу.)<br>Пропуск слов, понятных из контекста." }
            ],
            C2: [
                { id: "c2_1", title: "Идиомы", grammarFocus: "idioms", theory: "<strong>Идиомы</strong><br><br>'Spill the beans' — выдать секрет.<br>'Hit the nail on the head' — точно описать проблему." },
                { id: "c2_2", title: "Продвинутая инверсия", grammarFocus: "advanced inversion", theory: "<strong>Продвинутая инверсия</strong><br><br>'Had I known, I would have acted.' (Если бы я знал, я бы действовал.)<br>'Such was his anger that he left.' (Так велик был его гнев, что он ушёл.)" },
                { id: "c2_3", title: "Номинализация", grammarFocus: "nominalization", theory: "<strong>Номинализация</strong><br><br>'The discovery of the cure' вместо 'They discovered the cure'<br>Делает текст более формальным." },
                { id: "c2_4", title: "Риторические приёмы", grammarFocus: "rhetoric", theory: "<strong>Риторические приёмы</strong><br><br>Анафора: 'We shall fight on the beaches, we shall fight...' (Мы будем сражаться на пляжах, мы будем сражаться...)" }
            ]
        }
    };

    // Дополняем уровни до 8 тем
    for (let lvl of ['A1', 'A2', 'B1', 'B2', 'C1', 'C2']) {
        const current = KNOWLEDGE_BASE.English[lvl];
        const need = 8;
        while (current.length < need) {
            const num = current.length + 1;
            current.push({
                id: `${lvl.toLowerCase()}_extra_${num}`,
                title: `${lvl} — Тема ${num}: дополнительная практика`,
                grammarFocus: "general",
                theory: `<strong>Расширенный урок уровня ${lvl}</strong><br><br>Изучаем продвинутые конструкции уровня ${lvl}.<br>Пример: "They have been mastering these skills."<br>Практика через упражнения.`
            });
        }
    }

    // Генерация 20 заданий для темы (русские объяснения)
    function generatePracticeForTopic(topic, level, lang = "English") {
        let tasks = [];
        const grammar = topic.grammarFocus || "general";
        for (let i = 0; i < 20; i++) {
            if (grammar === "to be" || grammar === "present simple") {
                tasks.push({ type: "input", question: "Поставьте глагол в правильную форму: She ___ (be) a doctor.", correct: "is", aiExplanation: "She + is (3-е лицо единственного числа)" });
                tasks.push({ type: "choice", question: "Выберите правильный вариант: They ___ playing football now.", options: ["is", "am", "are", "be"], correct: "are", aiExplanation: "They are — форма для множественного числа." });
                tasks.push({ type: "input", question: "I ___ (like) coffee.", correct: "like", aiExplanation: "I + like (без окончания -s)" });
            } else if (grammar === "past simple") {
                tasks.push({ type: "input", question: "Поставьте в Past Simple: Yesterday I ___ (go) to the cinema.", correct: "went", aiExplanation: "Неправильный глагол: go → went (идти → пошёл)" });
                tasks.push({ type: "input", question: "She ___ (watch) TV last night.", correct: "watched", aiExplanation: "Правильный глагол: watch → watched (смотрела)" });
            } else if (grammar === "present perfect") {
                tasks.push({ type: "input", question: "I ___ (never/see) such a beautiful sunset.", correct: "have never seen", aiExplanation: "Present Perfect: have + V3 (никогда не видел)" });
                tasks.push({ type: "input", question: "She ___ (already/finish) her homework.", correct: "has already finished", aiExplanation: "Present Perfect: has + V3 (уже закончила)" });
            } else if (grammar === "passive") {
                tasks.push({ type: "input", question: "The cake ___ (make) by my grandmother.", correct: "was made", aiExplanation: "Пассивный залог: was + V3 (был сделан)" });
            } else if (grammar === "future") {
                tasks.push({ type: "input", question: "I ___ (call) you tomorrow.", correct: "will call", aiExplanation: "Future Simple: will + глагол (позвоню)" });
            } else if (grammar === "modals") {
                tasks.push({ type: "input", question: "She ___ (can) swim very well.", correct: "can", aiExplanation: "Модальный глагол can (умеет)" });
            } else {
                tasks.push({ type: "translate", question: "Переведите слово 'success'", correct: "success", aiExplanation: "success — успех" });
                tasks.push({ type: "input", question: "She advised that he ___ (go) there.", correct: "go", aiExplanation: "Сослагательное наклонение: advise that + go" });
            }
        }
        // Перемешиваем и берем 20
        for (let i = tasks.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [tasks[i], tasks[j]] = [tasks[j], tasks[i]];
        }
        return tasks.slice(0, 20);
    }

    // Состояние
    let currentLevel = "A1";
    let topics = KNOWLEDGE_BASE.English[currentLevel] || [];
    let completedTopics = JSON.parse(localStorage.getItem("aevi_completed")) || [];
    let mistakeHistory = JSON.parse(localStorage.getItem("aevi_mistakes")) || [];
    let currentTopic = null;
    let currentMode = "topics";
    let currentPracticeTasks = [];
    let currentTaskIdx = 0;
    let practiceAnswers = [];
    let practiceResults = [];
    let showExplanation = false;
    let lastMistakeInfo = null;

    function saveAll() {
        localStorage.setItem("aevi_completed", JSON.stringify(completedTopics));
        localStorage.setItem("aevi_mistakes", JSON.stringify(mistakeHistory));
        localStorage.setItem("aevi_level", currentLevel);
    }

    function selectTopic(topic) {
        currentTopic = topic;
        currentMode = "theory";
        renderApp();
    }

    function markTopicCompleted(topicId) {
        if (!completedTopics.includes(topicId)) {
            completedTopics.push(topicId);
            saveAll();
        }
    }

    function registerMistake(question, correct, userAnswer, grammarFocus) {
        mistakeHistory.unshift({ question, correct, userAnswer, grammarFocus, timestamp: Date.now() });
        if (mistakeHistory.length > 200) mistakeHistory.pop();
        saveAll();
        const recentMistakes = mistakeHistory.slice(0, 10).filter(m => m.grammarFocus === grammarFocus).length;
        const advice = recentMistakes < 3 
            ? "Вы прогрессируете, я буду реже спрашивать эту тему." 
            : "Ошибка повторяется, эта тема будет встречаться чаще.";
        return { explanation: `Анализ ИИ: Правильный ответ — "${correct}". Вы написали "${userAnswer}". ${grammarFocus ? `Обратите внимание на грамматику: ${grammarFocus}.` : ""} ${advice}` };
    }

    function startInfinitePractice() {
        let taskPool = [];
        const grammarSet = new Set(mistakeHistory.slice(0, 30).map(m => m.grammarFocus || "general"));
        Array.from(grammarSet).forEach(g => {
            for (let i=0;i<3;i++) taskPool.push({ type: "translate", question: `Практика грамматики [${g}]: переведите "уверенность"`, correct: "confidence", aiExplanation: "Повторение ошибок", grammarFocus: g });
        });
        if (taskPool.length<10) taskPool.push({ type: "input", question: "She ___ (to be) happy.", correct: "is", aiExplanation: "She + is", grammarFocus: "to be" });
        currentPracticeTasks = taskPool.slice(0,20);
        currentTaskIdx = 0;
        practiceAnswers = new Array(currentPracticeTasks.length).fill(null);
        practiceResults = new Array(currentPracticeTasks.length).fill(false);
        currentMode = "practice";
        showExplanation = false;
        renderApp();
    }

    function startTopicPractice() {
        if (!currentTopic) return;
        currentPracticeTasks = generatePracticeForTopic(currentTopic, currentLevel);
        currentTaskIdx = 0;
        practiceAnswers = new Array(currentPracticeTasks.length).fill(null);
        practiceResults = new Array(currentPracticeTasks.length).fill(false);
        currentMode = "practice";
        showExplanation = false;
        renderApp();
    }

    function finishPractice() {
        const total = currentPracticeTasks.length;
        const correctCount = practiceResults.filter(r => r === true).length;
        const percent = (correctCount / total) * 100;
        if (percent >= 70 && currentTopic) markTopicCompleted(currentTopic.id);
        currentMode = "results";
        renderApp();
    }

    function checkCurrentTask(answer) {
        const task = currentPracticeTasks[currentTaskIdx];
        const isCorrect = (answer.trim().toLowerCase() === task.correct.toLowerCase());
        practiceAnswers[currentTaskIdx] = answer;
        practiceResults[currentTaskIdx] = isCorrect;
        if (!isCorrect) {
            const aiResp = registerMistake(task.question, task.correct, answer, task.grammarFocus || "general");
            lastMistakeInfo = { explanation: aiResp.explanation };
            showExplanation = true;
            renderApp();
        } else {
            showExplanation = false;
            if (currentTaskIdx + 1 < currentPracticeTasks.length) {
                currentTaskIdx++;
                renderApp();
            } else {
                finishPractice();
            }
        }
        saveAll();
    }

    function backToTopics() {
        currentMode = "topics";
        currentTopic = null;
        renderApp();
    }

    function renderApp() {
        const container = document.getElementById('app');
        if (!container) return;

        const topicListHtml = topics.map((t, idx) => {
            const isCompleted = completedTopics.includes(t.id);
            const isActive = currentTopic && currentTopic.id === t.id;
            return `
                <div class="topic-item ${isCompleted ? 'completed' : ''} ${isActive ? 'active' : ''}" data-id="${t.id}">
                    <div class="topic-status">${isCompleted ? '✓' : idx+1}</div>
                    <div class="topic-name">${t.title}</div>
                    <div class="topic-badge">${t.grammarFocus === 'to be' ? 'глагол to be' : t.grammarFocus === 'present simple' ? 'Present Simple' : t.grammarFocus === 'plural' ? 'мн.число' : t.grammarFocus === 'articles' ? 'артикли' : t.grammarFocus || 'лексика'}</div>
                </div>
            `;
        }).join('');
        
        const completedCount = completedTopics.filter(id => topics.some(t => t.id === id)).length;
        
        let rightPanelHtml = '';
        
        if (currentMode === "topics") {
            rightPanelHtml = `
                <div class="theory-block">
                    <h2>Выберите тему</h2>
                    <p>Выберите тему из списка слева, чтобы начать обучение.</p>
                    <div class="infinite-practice-area">
                        <button class="btn-outline btn" id="globalInfiniteBtn">Практика ошибок + слова</button>
                    </div>
                </div>
            `;
        } else if (currentMode === "theory" && currentTopic) {
            rightPanelHtml = `
                <div class="theory-block">
                    <h2>${currentTopic.title}</h2>
                    <div class="mistake-stats">Ошибок в теме: ${mistakeHistory.filter(m => m.grammarFocus === currentTopic.grammarFocus).length}</div>
                    <div style="line-height:1.6; margin: 20px 0;">${currentTopic.theory}</div>
                    <button class="btn" id="startPracticeBtn">Начать практику (20 заданий)</button>
                    <button class="btn-outline btn" id="backToTopicsBtn">Назад к темам</button>
                </div>
            `;
        } else if (currentMode === "practice" && currentPracticeTasks.length) {
            const task = currentPracticeTasks[currentTaskIdx];
            const userAnswer = practiceAnswers[currentTaskIdx] || '';
            const isAnswered = practiceAnswers[currentTaskIdx] !== null;
            rightPanelHtml = `
                <div class="practice-block">
                    <div style="display:flex; justify-content:space-between; margin-bottom:16px;">
                        <h3>Практика: ${currentTopic?.title || 'Практика ошибок'}</h3>
                        <span>${currentTaskIdx+1}/${currentPracticeTasks.length}</span>
                    </div>
                    <div class="progress"><div class="progress-fill" style="width:${(currentTaskIdx/currentPracticeTasks.length)*100}%"></div></div>
                    <div class="practice-question">
                        <p><strong>${task.question}</strong></p>
                        ${task.type === 'choice' ? `<div class="options">${task.options.map(opt => `<div class="option" data-val="${opt}">${opt}</div>`).join('')}</div>` : `<input type="text" id="answerField" class="practice-input" placeholder="Ваш ответ..." value="${userAnswer || ''}">`}
                        <button class="btn" id="submitAnswerBtn" style="margin-top:12px">${isAnswered ? 'Изменить' : 'Проверить'}</button>
                        ${showExplanation && lastMistakeInfo ? `<div class="ai-explanation">${lastMistakeInfo.explanation}</div>` : ''}
                    </div>
                </div>
            `;
        } else if (currentMode === "results") {
            const total = currentPracticeTasks.length;
            const correctCount = practiceResults.filter(r => r === true).length;
            const percent = Math.round((correctCount / total) * 100);
            rightPanelHtml = `
                <div class="results-block">
                    <h2>Результаты практики</h2>
                    <div style="text-align:center; margin: 40px 0;">
                        <div style="font-size: 48px; font-weight: bold; color: #0aff9d;">${correctCount}/${total}</div>
                        <div style="font-size: 18px; margin-top: 8px;">${percent}% правильно</div>
                    </div>
                    <div class="progress"><div class="progress-fill" style="width:${percent}%"></div></div>
                    ${percent >= 70 ? '<p style="margin: 20px 0; text-align:center;">Тема пройдена! Отличная работа.</p>' : '<p style="margin: 20px 0; text-align:center;">Повторите теорию и попробуйте снова.</p>'}
                    <button class="btn" id="backToTopicsBtn">Назад к темам</button>
                </div>
            `;
        }

        container.innerHTML = `
            <div class="topics-panel">
                <div class="topics-header">
                    <h3><span class="glow-text">Aevi</span> · ${currentLevel}</h3>
                    <select id="levelSelect" class="level-selector">
                        <option value="A1" ${currentLevel==='A1' ? 'selected' : ''}>Уровень A1 (Начальный)</option>
                        <option value="A2" ${currentLevel==='A2' ? 'selected' : ''}>Уровень A2 (Элементарный)</option>
                        <option value="B1" ${currentLevel==='B1' ? 'selected' : ''}>Уровень B1 (Средний)</option>
                        <option value="B2" ${currentLevel==='B2' ? 'selected' : ''}>Уровень B2 (Выше среднего)</option>
                        <option value="C1" ${currentLevel==='C1' ? 'selected' : ''}>Уровень C1 (Продвинутый)</option>
                        <option value="C2" ${currentLevel==='C2' ? 'selected' : ''}>Уровень C2 (Профессиональный)</option>
                    </select>
                </div>
                <div class="progress"><div class="progress-fill" style="width:${(completedCount/topics.length)*100}%"></div></div>
                <div class="topic-list" id="topicList">
                    ${topicListHtml}
                </div>
                <div class="infinite-practice-area">
                    <button class="btn-outline btn" id="globalInfiniteBtn">Практика ошибок + слова</button>
                </div>
            </div>
            <div class="content-panel" id="rightPanel">${rightPanelHtml}</div>
        `;

        document.getElementById('levelSelect')?.addEventListener('change', (e) => {
            currentLevel = e.target.value;
            topics = KNOWLEDGE_BASE.English[currentLevel] || [];
            currentTopic = null;
            currentMode = "topics";
            saveAll();
            renderApp();
        });
        
        document.querySelectorAll('.topic-item').forEach(el => {
            const topicId = el.dataset.id;
            const topic = topics.find(t => t.id === topicId);
            if (topic) {
                el.addEventListener('click', () => selectTopic(topic));
            }
        });
        
        document.getElementById('startPracticeBtn')?.addEventListener('click', startTopicPractice);
        document.getElementById('backToTopicsBtn')?.addEventListener('click', backToTopics);
        document.getElementById('globalInfiniteBtn')?.addEventListener('click', startInfinitePractice);
        
        document.getElementById('submitAnswerBtn')?.addEventListener('click', () => {
            let answer = '';
            const task = currentPracticeTasks[currentTaskIdx];
            if (task.type === 'choice') {
                const selected = document.querySelector('.option.selected');
                if (!selected) return;
                answer = selected.dataset.val;
            } else {
                const field = document.getElementById('answerField');
                if (!field) return;
                answer = field.value.trim();
            }
            checkCurrentTask(answer);
        });
        
        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', function() {
                if (practiceAnswers[currentTaskIdx] !== null) return;
                document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
            });
        });
    }
    
    renderApp();
</script>
</body>
</html>
