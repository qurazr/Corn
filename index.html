<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Aevi — A1 English Learning</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0B0E17;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            color: #FFFFFF;
            padding: 1rem;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
        }

        .topics-panel {
            flex: 2;
            min-width: 260px;
            background: rgba(18, 22, 35, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(0, 255, 157, 0.2);
            padding: 1.5rem;
            height: fit-content;
        }

        .topics-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .tab-switch {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: #0F1322;
            border: 1px solid #2A2F42;
            border-radius: 40px;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: #0aff9d;
            color: #0B0E17;
            border-color: #0aff9d;
        }

        .topic-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 6px;
        }

        .topic-item {
            background: #111624;
            border-radius: 60px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border: 1px solid #282E44;
            transition: 0.2s;
        }

        .topic-item.completed {
            background: rgba(0, 255, 157, 0.12);
            border-color: #0aff9d;
        }

        .topic-item.completed .topic-status {
            background: #0aff9d;
            color: #0B0E17;
        }

        .topic-item.active {
            border-color: #0aff9d;
            box-shadow: 0 0 12px rgba(0, 255, 157, 0.3);
            background: #1A2035;
        }

        .topic-status {
            width: 28px;
            height: 28px;
            background: #2A2F42;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .topic-name {
            flex: 1;
            font-weight: 500;
        }

        .topic-badge {
            font-size: 11px;
            background: #00c3ff20;
            padding: 4px 10px;
            border-radius: 60px;
            color: #7df9ff;
        }

        .content-panel {
            flex: 5;
            min-width: 300px;
            background: rgba(12, 15, 26, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            border: 1px solid rgba(0, 255, 157, 0.25);
            padding: 1.8rem;
            max-height: 80vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .glow-text {
            background: linear-gradient(135deg, #BFFFC7, #7DF9FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
        }

        .btn {
            background: linear-gradient(95deg, #0aff9d, #00c3ff);
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 700;
            color: #0B0E17;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
            font-size: 1rem;
            transition: 0.2s;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #0aff9d;
            color: #0aff9d;
        }

        .progress {
            margin: 10px 0;
            height: 6px;
            background: #1e2a32;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #0aff9d, #00c3ff);
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 500px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            background: #0F1322;
            border-radius: 24px;
            margin-bottom: 16px;
            max-height: 500px;
        }

        .message {
            margin-bottom: 8px;
            padding: 10px 14px;
            border-radius: 18px;
            max-width: 95%;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 0.95rem;
            line-height: 1.45;
        }

        .ai-message {
            background: #1A2035;
            border: 1px solid #2A2F42;
            color: #fff;
        }

        .button-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
            margin-bottom: 16px;
        }

        .question-btn {
            background: #0F1322;
            border: 1px solid #0aff9d;
            border-radius: 40px;
            padding: 10px 18px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #0aff9d;
            transition: 0.2s;
            font-weight: 500;
        }

        .question-btn:hover {
            background: #0aff9d20;
        }

        .vocabulary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }

        .vocab-card {
            background: #0F1322;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid #2A2F42;
        }

        .vocab-word {
            font-weight: bold;
            color: #0aff9d;
        }

        .vocab-translation {
            font-size: 0.9rem;
            color: #8A93B0;
            margin-top: 4px;
        }

        .practice-question {
            background: #11161f;
            border-radius: 24px;
            padding: 1.2rem;
            margin-bottom: 1.2rem;
        }

        .practice-input {
            background: #0a0f16;
            border: 1px solid #2a3a4a;
            border-radius: 40px;
            padding: 12px 18px;
            width: 100%;
            color: white;
            margin: 12px 0;
            font-size: 1rem;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            background: #0f141c;
            padding: 12px 18px;
            border-radius: 40px;
            cursor: pointer;
            border: 1px solid #2c3a4a;
            text-align: center;
        }

        .option:hover {
            border-color: #0aff9d;
            background: #1a2a2f;
        }

        .selected {
            background: #0aff9d20;
            border-color: #0aff9d;
            color: #ccffdd;
        }

        .header-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        @media (max-width: 780px) {
            .app-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="app-container" id="app"></div>

<script>
    // ==================== ГРАММАТИЧЕСКИЕ ТЕМЫ A1 ====================
    const grammarTopics = [
        { id: "g1", name: "Глагол TO BE (am/is/are)" },
        { id: "g2", name: "Present Simple (I work, he works)" },
        { id: "g3", name: "Present Continuous (I am doing)" },
        { id: "g4", name: "Модальный глагол CAN" },
        { id: "g5", name: "Future: to be going to" },
        { id: "g6", name: "Past Simple: was/were" },
        { id: "g7", name: "Wh-questions (what, where, when)" },
        { id: "g8", name: "There is / There are" },
        { id: "g9", name: "Like + verb-ing (like reading)" },
        { id: "g10", name: "Местоимения (I, me, my)" }
    ];

    // ==================== ПОЛНАЯ ТЕОРИЯ ДЛЯ КАЖДОЙ ТЕМЫ ====================
    const theoryDB = {
        "g1": {
            full: `Глагол TO BE (am/is/are)

Значение: быть, находиться, являться. В русском языке часто опускается, но в английском обязателен.

Формы в настоящем времени:
- I am (я есть)
- He/She/It is (он/она/оно есть)
- You/We/They are (ты/вы/мы/они есть)

Утверждение:
I am a student. (Я студент)
She is a doctor. (Она врач)
We are happy. (Мы счастливы)

Отрицание: добавляем not после глагола
I am not tired. (Я не устал)
He is not (isn't) at home.
They are not (aren't) ready.

Вопрос: ставим глагол на первое место
Am I late? (Я опоздал?)
Is she your sister? (Она твоя сестра?)
Are you OK? (Ты в порядке?)

Короткие ответы:
Yes, I am. / No, I'm not.
Yes, she is. / No, she isn't.`,
            examples: `Примеры с глаголом to be:

1. I am a teacher. (Я учитель)
2. You are my friend. (Ты мой друг)
3. He is from London. (Он из Лондона)
4. She is beautiful. (Она красивая)
5. It is a cat. (Это кот)
6. We are students. (Мы студенты)
7. They are at home. (Они дома)
8. I am not ready. (Я не готов)
9. Is she happy? (Она счастлива?)
10. Are they coming? (Они идут?)`,
            negative: `Отрицание с глаголом to be:

Формула: подлежащее + am/is/are + not

Сокращённые формы:
I am not = I'm not
He is not = He isn't
She is not = She isn't
It is not = It isn't
You are not = You aren't
We are not = We aren't
They are not = They aren't

Примеры:
I am not hungry. (Я не голоден)
She is not (isn't) a doctor. (Она не врач)
They are not (aren't) here. (Их здесь нет)

Вопрос с отрицанием:
Isn't she nice? (Разве она не мила?)
Aren't you ready? (Разве ты не готов?)`,
            questions: `Вопросы с глаголом to be:

Формула: Am/Is/Are + подлежащее + ...?

Примеры вопросов:
Am I late? (Я опоздал?)
Is she a doctor? (Она врач?)
Are you ready? (Ты готов?)
Is it cold outside? (На улице холодно?)
Are they at home? (Они дома?)

Короткие ответы:
Am I? -> Yes, you are. / No, you aren't.
Is she? -> Yes, she is. / No, she isn't.
Are you? -> Yes, I am. / No, I'm not.
Are they? -> Yes, they are. / No, they aren't.`
        },
        "g2": {
            full: `Present Simple (настоящее простое время)

Используется для:
- Фактов (The sun rises in the east)
- Привычек и рутины (I drink coffee every morning)
- Расписаний (The train leaves at 6 PM)

Формула:
I/You/We/They + глагол (без изменений)
He/She/It + глагол + s/es

Утверждение:
I work in an office.
She works at a hospital.
He goes to school.

Отрицание:
I don't (do not) like coffee.
She doesn't (does not) speak Spanish.
They don't live in London.

Вопрос:
Do you like music?
Does she play tennis?
Do they know the answer?

Короткие ответы:
Yes, I do. / No, I don't.
Yes, she does. / No, she doesn't.

Правила добавления -es:
- после s, ss, sh, ch, x, o: go -> goes, watch -> watches
- согласная + y: study -> studies`,
            examples: `Примеры Present Simple:

Утверждение:
1. I wake up at 7 AM every day.
2. You speak English very well.
3. He plays football on Sundays.
4. She works in a bank.
5. It rains a lot in autumn.
6. We go to the gym twice a week.
7. They live in a small town.

Отрицание:
8. I don't like spicy food.
9. She doesn't eat meat.
10. They don't have a car.

Вопрос:
11. Do you like pizza?
12. Does he play the guitar?
13. Where do they live?`,
            negative: `Отрицание в Present Simple:

Формула для I/You/We/They:
подлежащее + do not (don't) + глагол

Формула для He/She/It:
подлежащее + does not (doesn't) + глагол

ВАЖНО: после doesn't глагол возвращается в начальную форму (без -s).

Примеры:
I don't smoke. (Я не курю)
You don't need to go. (Тебе не нужно идти)
He doesn't like coffee. (Он не любит кофе)
She doesn't work here. (Она здесь не работает)
It doesn't matter. (Это не важно)
We don't have time. (У нас нет времени)
They don't know the answer. (Они не знают ответа)`,
            questions: `Вопросы в Present Simple:

Для I/You/We/They: Do + подлежащее + глагол?
Для He/She/It: Does + подлежащее + глагол?

Примеры:
Do you like music? (Ты любишь музыку?)
Do they speak English? (Они говорят по-английски?)
Does she play tennis? (Она играет в теннис?)
Does he work here? (Он здесь работает?)

Специальные вопросы:
What do you do? (Чем ты занимаешься?)
Where does she live? (Где она живёт?)
When do you get up? (Когда ты встаёшь?)

Короткие ответы:
Yes, I do. / No, I don't.
Yes, she does. / No, she doesn't.`
        },
        "g3": {
            full: `Present Continuous (настоящее длительное время)

Используется для действий, которые происходят прямо сейчас, в момент речи.

Формула: to be (am/is/are) + глагол + ing

Утверждение:
I am reading a book now.
She is watching TV.
They are playing football.

Отрицание:
I am not sleeping.
He isn't working.
We aren't listening.

Вопрос:
Are you listening to me?
Is she coming to the party?
What are you doing?

Слова-маркеры: now, at the moment, today, this week, right now

Разница с Present Simple:
- Present Simple: I work every day (обычно, всегда)
- Present Continuous: I am working now (прямо сейчас)

Правила добавления -ing:
- большинство глаголов: +ing (work -> working)
- глаголы на -e: убираем e + ing (come -> coming)
- короткие глаголы: удваиваем согласную (run -> running)`,
            examples: `Примеры Present Continuous:

Утверждение:
1. I am writing a letter right now.
2. You are sitting on my chair.
3. He is reading a newspaper.
4. She is cooking dinner.
5. It is raining outside.
6. We are learning English.
7. They are playing in the garden.

Отрицание:
8. I am not sleeping.
9. She isn't working today.
10. They aren't listening to me.

Вопрос:
11. Are you watching TV?
12. Is she coming to the party?
13. What are you doing here?`,
            negative: `Отрицание в Present Continuous:

Формула: подлежащее + am/is/are + not + глагол + ing

Примеры:
I am not reading. (Я не читаю)
He is not (isn't) working. (Он не работает)
She is not (isn't) sleeping. (Она не спит)
We are not (aren't) playing. (Мы не играем)
They are not (aren't) listening. (Они не слушают)

Сокращённые формы:
I'm not working
He isn't working
She isn't working
We aren't working
They aren't working`,
            questions: `Вопросы в Present Continuous:

Формула: Am/Is/Are + подлежащее + глагол + ing?

Примеры:
Am I doing it right? (Я правильно делаю?)
Are you listening to me? (Ты меня слушаешь?)
Is she sleeping? (Она спит?)
Are they coming? (Они идут?)

Специальные вопросы:
What are you doing? (Что ты делаешь?)
Where is she going? (Куда она идёт?)
Why are you laughing? (Почему ты смеёшься?)`
        },
        "g4": {
            full: `Модальный глагол CAN

CAN означает "мочь, уметь, иметь возможность".

Особенности:
- не меняет форму (нет -s в 3-м лице)
- после него идёт глагол без to
- для отрицания и вопроса не нужен do/does

Утверждение:
I can swim. (Я умею плавать)
She can speak French. (Она умеет говорить по-французски)
They can come tomorrow. (Они могут прийти завтра)

Отрицание: cannot или can't
I can't drive a car. (Я не умею водить)
He can't attend the meeting. (Он не может присутствовать)

Вопрос:
Can you help me? (Ты можешь мне помочь?)
Can she play the piano? (Она умеет играть на пианино?)

CAN для разрешения:
You can go now. (Ты можешь идти)
Can I open the window? (Можно я открою окно?)`,
            examples: `Примеры с глаголом CAN:

Утверждение:
1. I can swim very well.
2. You can do it!
3. He can speak three languages.
4. She can play the guitar.
5. It can be dangerous.
6. We can help you.
7. They can come tomorrow.

Отрицание:
8. I can't understand this.
9. She cannot drive a car.
10. They can't hear you.

Вопрос:
11. Can you help me?
12. Can she sing?
13. Can we go now?

Разрешение:
14. You can take my book.
15. Can I use your phone?`,
            negative: `Отрицание с глаголом CAN:

Формула: подлежащее + cannot (can't) + глагол

Полная форма: cannot
Короткая форма: can't

Примеры:
I can't swim. (Я не умею плавать)
You can't park here. (Вам нельзя здесь парковаться)
He can't speak Japanese. (Он не говорит по-японски)
She can't find her keys. (Она не может найти ключи)
It can't be true. (Это не может быть правдой)
We can't wait any longer. (Мы не можем ждать дольше)
They can't hear you. (Они тебя не слышат)`,
            questions: `Вопросы с глаголом CAN:

Формула: Can + подлежащее + глагол?

Примеры вопросов:
Can I help you? (Я могу вам помочь?)
Can you speak English? (Ты говоришь по-английски?)
Can he drive a car? (Он умеет водить машину?)
Can she sing? (Она умеет петь?)
Can we go now? (Мы можем идти?)
Can they come tomorrow? (Они могут прийти завтра?)

Короткие ответы:
Yes, I can. / No, I can't.
Yes, she can. / No, she can't.

Can для разрешения:
Can I open the window? (Можно я открою окно?)
Can I use your phone? (Можно мне воспользоваться твоим телефоном?)`
        },
        "g5": {
            full: `Конструкция to be going to

Выражает:
1. Планы и намерения на будущее (решение уже принято)
2. Прогнозы, основанные на очевидных фактах

Формула: to be (am/is/are) + going to + глагол

Планы:
I am going to study English. (Я собираюсь учить английский)
She is going to travel to Spain. (Она собирается поехать в Испанию)
We are going to buy a new car. (Мы собираемся купить новую машину)

Прогнозы:
Look at those clouds! It is going to rain. (Будет дождь)
The traffic is terrible. We are going to be late. (Мы опоздаем)

Отрицание:
I am not going to call him.
She isn't going to eat that.

Вопрос:
Are you going to come?
Is she going to study?`,
            examples: `Примеры to be going to:

Планы:
1. I am going to visit my parents tomorrow.
2. You are going to like this movie.
3. He is going to buy a new phone.
4. She is going to start a new job.
5. We are going to have dinner at 7 PM.
6. They are going to move to a new flat.

Прогнозы:
7. Look! It is going to snow.
8. The glass is going to fall.
9. He is going to win the race.

Отрицание:
10. I am not going to tell him.
11. She isn't going to accept this job.

Вопрос:
12. Are you going to stay here?
13. Is he going to call me?`,
            negative: `Отрицание в to be going to:

Формула: подлежащее + am/is/are + not + going to + глагол

Примеры:
I am not going to do it. (Я не собираюсь это делать)
You aren't going to believe this. (Ты не поверишь этому)
He isn't going to come. (Он не собирается приходить)
She isn't going to accept the offer. (Она не примет предложение)
We aren't going to wait. (Мы не будем ждать)
They aren't going to help us. (Они не будут нам помогать)

Короткие формы:
I'm not going to
You aren't going to
He isn't going to
We aren't going to`,
            questions: `Вопросы в to be going to:

Формула: Am/Is/Are + подлежащее + going to + глагол?

Примеры:
Am I going to regret this? (Я пожалею об этом?)
Are you going to stay here? (Ты собираешься здесь остаться?)
Is he going to call me? (Он мне позвонит?)
Is she going to study abroad? (Она будет учиться за границей?)
Are we going to win? (Мы выиграем?)
Are they going to help us? (Они нам помогут?)

Специальные вопросы:
What are you going to do? (Что ты собираешься делать?)
Where is she going to live? (Где она будет жить?)
When are they going to arrive? (Когда они приедут?)`
        },
        "g6": {
            full: `Past Simple глагола TO BE (was/were)

В прошедшем времени to be имеет две формы:
- I/He/She/It was (я/он/она/оно был/а/о)
- You/We/They were (ты/вы/мы/они были)

Утверждение:

                <div class="results-block">
                    <h2>Результаты практики</h2>
                    <div style="text-align:center; margin: 40px 0;">
                        <div style="font-size: 48px; font-weight: bold; color: #0aff9d;">${correctCount}/${currentTasks.length}</div>
                        <div style="font-size: 18px;">${percent}% правильно</div>
                    </div>
                    <div class="progress"><div class="progress-fill" style="width:${percent}%"></div></div>
                    ${percent >= 70 ? '<p style="margin: 20px 0; text-align:center;">Тема пройдена. Отличная работа.</p>' : '<p style="margin: 20px 0; text-align:center;">Повторите тему и попробуйте снова.</p>'}
                    <button class="btn" id="backToChatBtn">Вернуться к чату</button>
                </div>
            `;
        }

        container.innerHTML = `
            <div class="topics-panel">
                <div class="topics-header">
                    <h3><span class="glow-text">Aevi</span> · A1</h3>
                </div>
                <div class="tab-switch">
                    <div class="tab-btn ${currentTab === 'grammar' ? 'active' : ''}" data-tab="grammar">Грамматика</div>
                    <div class="tab-btn ${currentTab === 'vocabulary' ? 'active' : ''}" data-tab="vocabulary">Лексика</div>
                </div>
                <div class="progress"><div class="progress-fill" style="width:${(completedCount/currentTopics.length)*100}%"></div></div>
                <div class="topic-list" id="topicList">
                    ${topicListHtml}
                </div>
            </div>
            <div class="content-panel" id="rightPanel">${rightPanelHtml}</div>
        `;

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentTab = btn.dataset.tab;
                currentMode = "topics";
                currentTopic = null;
                renderApp();
            });
        });

        document.querySelectorAll('.topic-item').forEach(el => {
            const topicId = el.dataset.id;
            let topic;
            if (currentTab === "grammar") {
                topic = grammarTopics.find(t => t.id === topicId);
            } else {
                topic = vocabularyTopics.find(t => t.id === topicId);
            }
            if (topic) {
                el.addEventListener('click', () => selectTopic(topic));
            }
        });

        document.getElementById('practiceBtn')?.addEventListener('click', startPractice);
        document.getElementById('backBtn')?.addEventListener('click', backToTopics);
        document.getElementById('backToChatBtn')?.addEventListener('click', () => {
            currentMode = "chat";
            renderApp();
        });
        
        document.querySelectorAll('.question-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const type = btn.dataset.type;
                const response = getTheoryResponse(type);
                addAIMessage(response);
            });
        });
        
        document.getElementById('submitBtn')?.addEventListener('click', () => {
            if (currentTasks[currentTaskIdx].type === 'choice') {
                const selected = document.querySelector('.option.selected');
                if (selected) checkAnswer(selected.dataset.val);
            } else {
                const input = document.getElementById('answerInput');
                if (input) checkAnswer(input.value);
            }
        });
        
        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', function() {
                document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
            });
        });
        
        const chatMessagesDiv = document.getElementById('chatMessages');
        if (chatMessagesDiv) {
            chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
        }
    }

    renderApp();
</script>
</body>
</html>
