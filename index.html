<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aevi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; font-family: system-ui; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    #app { max-width: 600px; width: 100%; }
    .card { background: #111; padding: 24px; border-radius: 24px; border: 1px solid #0aff9d; }
    h2 { color: #0aff9d; margin-bottom: 16px; }
    .option { background: #1e1e2e; padding: 12px; margin: 8px 0; border-radius: 40px; cursor: pointer; text-align: center; }
    .option:hover { background: #0aff9d33; }
    .selected { background: #0aff9d; color: black; }
    button { background: #0aff9d; border: none; padding: 12px; border-radius: 40px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 12px; }
    .progress { height: 4px; background: #333; border-radius: 4px; margin-top: 16px; }
    .progress-fill { height: 100%; background: #0aff9d; width: 0%; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    // ПРОСТЕЙШИЙ ТЕСТ
    document.getElementById('app').innerHTML = `
      <div class="card">
        <h2>🌙 Aevi</h2>
        <p style="color:white;">Если ты это видишь — приложение работает!</p>
        <button onclick="alert('Привет!')">Нажми меня</button>
      </div>
    `;
  </script>
</body>
</html>
